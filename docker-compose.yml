version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - three-tier-network

  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    ports:
      - "3500:3500"
    env_file:
      - ./app/backend/.env
    depends_on:
      - mongodb
    networks:
      - three-tier-network

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - three-tier-network

networks:
  three-tier-network:

volumes:
  mongodb_data: